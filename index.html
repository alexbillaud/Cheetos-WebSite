<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cheetos Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, orange, red);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 2em;
      font-weight: bold;
    }

    nav {
      background: rgba(0,0,0,0.2);
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 500px;
    }

    button {
      background: black;
      color: orange;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: white;
      color: red;
    }

    /* 👇 NOUVEAU : galerie */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<header>🔥 Cheetos World 🔥</header>

<nav>
  <a href="#">Meow</a>
  <a href="#">Photos du king</a>
  <a href="#">Réseaux sociaux</a>
  <a href="#">Cagnottes</a>
</nav>

<div class="card">
  <h2>Bienvenue !!!</h2>
  <p>Toi fan du Roi Cheetos 1er du nom !</p>
</div>

<!-- 👇 NOUVELLE SECTION PHOTOS -->

<div class="card">
  <h2>Snacks préférés</h2>
  <p>Friandises au fromage</p>
  <p>Pastèque</p>
  <p>Oiseaux</p>
  <button onclick="alert('Cheetos t'aimes encore plus')">Boop</button>
</div>

</body>
</html>
