<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Photos du King</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, orange, red);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 2em;
      font-weight: bold;
    }

    nav {
      background: rgba(0,0,0,0.2);
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .gallery img {
      width: 250px;
      margin: 10px;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<header>📸 Photos du King 👑</header>

<nav>
  <a href="index.html">Accueil</a>
  <a href="photos.html">Photos du king</a>
</nav>

<div class="gallery">
  <img src="bb chat.jpg">
</div>

</body>
</html>
